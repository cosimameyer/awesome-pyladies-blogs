name: Greet first-time contributors

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  greet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const isPR = !!context.payload.pull_request;
            const payload = isPR ? context.payload.pull_request : context.payload.issue;
            const author = payload.user.login;
            const number = payload.number;

            // listForRepo returns both issues and PRs (PRs are issues in GitHub's model)
            const prior = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              creator: author,
              state: 'all',
              per_page: 100,
            });

            const others = prior.filter(i => i.number !== number);
            if (others.length > 0) {
              core.info(`${author} has ${others.length} prior issue(s)/PR(s) — skipping greeting.`);
              return;
            }

            const body = isPR
              ? "Hey, thank you for opening your first Pull Request! 🙂 We will get to this as soon as we can!"
              : "Hey, thank you for opening your first Issue! 🙂 We will get to this as soon as we can!";

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: number,
              body,
            });
