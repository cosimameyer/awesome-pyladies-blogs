name: Auto-update README after merge

on:
  push:
    branches:
      - main
    paths:
      - 'data/content/**'
      - 'data/packages/**'
      - 'data/chapters/**'
  schedule:
    - cron: '0 0 1 * *'
      
permissions:
  contents: write
  pull-requests: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
          pip install -r requirements.txt || echo "No requirements.txt found"

      - name: Run README generator
        run: python scripts/generate_readme.py

      - name: Run site generator
        run: python scripts/generate_site.py

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "action@github.com"

      - name: Check for changes
        id: git-diff
        run: |
          git add README.md docs/index.html docs/people.html docs/content.html docs/chapters.html docs/packages.html docs/about.html
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Push update branch, create PR, and auto-merge
        if: steps.git-diff.outputs.changed == 'true'
        env:
          GITHUB_PAT: ${{ secrets.ACTIONS_PAT }}
          BASE_BRANCH: main
        run: |
          UPDATE_BRANCH="update/readme-${GITHUB_RUN_NUMBER}"

          # Reset to main clean state
          git checkout -b "$UPDATE_BRANCH"

          # Commit updated README and site
          git add README.md docs/index.html docs/people.html docs/content.html docs/chapters.html docs/packages.html docs/about.html
          git commit -m "chore: auto-update README and site"

          git remote set-url origin https://x-access-token:${GITHUB_PAT}@github.com/${{ github.repository }}.git
          git push --force --set-upstream origin "$UPDATE_BRANCH"

          # Check if a PR from this branch exists
          EXISTING_PR=$(curl -s \
            -H "Authorization: token ${GITHUB_PAT}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls?head=${{ github.repository_owner }}:$UPDATE_BRANCH" | jq '.[0].number')

          if [[ "$EXISTING_PR" != "null" ]]; then
            echo "PR #$EXISTING_PR already exists for $UPDATE_BRANCH"
            PR_NUMBER="$EXISTING_PR"
          else
            echo "Creating new PR for updated README"
            PR_NUMBER=$(curl -s -X POST \
              -H "Authorization: token ${GITHUB_PAT}" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/${{ github.repository }}/pulls \
              -d "{
                \"title\": \"chore: auto-update README and site\",
                \"head\": \"$UPDATE_BRANCH\",
                \"base\": \"$BASE_BRANCH\",
                \"body\": \"Automated README and GitHub Pages site update after merge\"
              }" | jq '.number')
            echo "Created PR #$PR_NUMBER"
          fi

          # Merge the PR automatically
          echo "Merging PR #$PR_NUMBER"
          curl -s -X PUT \
            -H "Authorization: token ${GITHUB_PAT}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/${PR_NUMBER}/merge" \
            -d "{
              \"merge_method\": \"squash\",
              \"commit_title\": \"chore: auto-update README and site\",
              \"commit_message\": \"Automated README and GitHub Pages site update\"
            }"
